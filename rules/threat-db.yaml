# Our defenses
defenses:
  hooks:
    - prompt-injection-detector.sh
    - dangerous-actions-blocker.sh
    - output-scanner.sh
    - rtk-rewrite.sh
  rules:
    - safety-defaults.md
    - verify-before-assume.md
  settings:
    - permissions.deny for .env files
    - sandbox mode default
